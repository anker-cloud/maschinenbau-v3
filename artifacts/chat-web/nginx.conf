server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the api-server container
    location /api/ {
        proxy_pass http://api-server:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Strip Origin so CORS middleware sees an internal (same-origin) request
        proxy_set_header Origin "";

        # Required for SSE (Server-Sent Events) — disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
    }

    # SPA routing — serve index.html for all unmatched paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
